<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Space Flight Demo</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; font-family: monospace; }
#info { position: fixed; top: 12px; left: 12px; z-index: 10; color: #aaa; font-size: 13px; pointer-events: none; line-height: 1.8; }
#hud  { position: fixed; bottom: 12px; left: 12px; z-index: 10; color: #4af; font-size: 13px; pointer-events: none; }
#lock-msg {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%,-50%);
  color: #fff; font-size: 18px; text-align: center;
  background: rgba(0,0,0,0.65); padding: 20px 36px; border-radius: 8px;
  pointer-events: none;
}
#load-status {
  position: fixed; top: 50%; left: 50%; transform: translate(-50%, calc(-50% + 60px));
  color: #4af; font-size: 14px; pointer-events: none;
}
canvas { display: block; }
</style>
</head>
<body>
<div id="info">
  W/S — тяга<br>A/D — стрейф<br>Мышь — поворот<br>
  Q/E — крен<br>Shift — форсаж<br>Space/Ctrl — вверх/вниз<br>
  ЛКМ / F — огонь<br>Esc — отпустить мышь
</div>
<div id="hud">SPD: <span id="spd">0</span> &nbsp;|&nbsp; POS: <span id="pos">0, 0, 0</span></div>
<div id="lock-msg">Кликните для захвата мыши</div>
<div id="load-status">Загрузка модели...</div>
<canvas id="c"></canvas>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script src="Ship.manifest.js"></script>
<script src="ship-loader.js"></script>
<script src="Station.manifest.js"></script>
<script src="station-loader.js"></script>
<script src="Patrol.manifest.js"></script>
<script src="patrol-loader.js"></script>
<script src="main.js"></script>
</body>
</html>
